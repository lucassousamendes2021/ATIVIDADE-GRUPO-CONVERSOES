<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Tempo</title>
    <link rel="stylesheet" href="pagina-4.css">
</head>
<body>
    <div class="converter-container">
        <h2>Conversor de Tempo</h2>
        <p>Converta minutos para segundos instantaneamente</p>
        
        <div class="input-group">
            <input type="number" id="minutesInput" placeholder="Digite os minutos..." min="0">
            <button id="convertBtn">Converter</button>
        </div>

        <div class="result-box" id="resultBox">
            <span id="resultValue">0</span> <small>segundos</small>
        </div>
    </div>

    <script src="pagina-4.js"></script>
</body>
</html>
