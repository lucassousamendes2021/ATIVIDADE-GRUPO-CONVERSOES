<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Centímetros para Metros</title>
    <style>
        /* CSS EMBUTIDO */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container-conversor {
            background-color: #ffffff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 8px;
        }

        .subtitulo {
            color: #7f8c8d;
            font-size: 0.9rem;
            margin-bottom: 25px;
        }

        .campo-grupo {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 600;
            color: #34495e;
            margin-bottom: 8px;
        }

        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        input[type="number"]:focus {
            border-color: #3498db;
            box-shadow: 0 0 8px rgba(52, 152, 219, 0.3);
        }

        button {
            width: 100%;
            background-color: #3498db;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:active {
            transform: scale(0.98);
        }

        .resultado-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 5px solid #2ecc71;
            display: none;
        }

        #resultadoTexto {
            font-size: 1.2rem;
            font-weight: 600;
            color: #2c3e50;
        }
    </style>
</head>
<body>

    <div class="container-conversor">
        <h1>Conversor de Medidas</h1>
        <p class="subtitulo">Transforme centímetros em metros facilmente</p>

        <div class="campo-grupo">
            <label for="cmInput">Centímetros (cm):</label>
            <input type="number" id="cmInput" placeholder="Ex: 150" min="0">
        </div>

        <button id="btnConverter">Converter</button>

        <div id="resultadoContainer" class="resultado-box">
            <p id="resultadoTexto"></p>
        </div>
    </div>

    <script>
        // JAVASCRIPT EMBUTIDO
        const cmInput = document.getElementById('cmInput');
        const btnConverter = document.getElementById('btnConverter');
        const resultadoContainer = document.getElementById('resultadoContainer');
        const resultadoTexto = document.getElementById('resultadoTexto');

        function converterMedida() {
            const valorCm = cmInput.value;

            if (valorCm === '') {
                alert('Por favor, digite um valor em centímetros.');
                return;
            }

            const valorMetros = parseFloat(valorCm) / 100;

            const cmFormatado = parseFloat(valorCm).toLocaleString('pt-BR');
            const metrosFormatado = valorMetros.toLocaleString('pt-BR', { maximumFractionDigits: 4 });

            resultadoTexto.textContent = `${cmFormatado} cm = ${metrosFormatado} m`;
            resultadoContainer.style.display = 'block';
        }

        btnConverter.addEventListener('click', converterMedida);

        cmInput.addEventListener('keypress', function(evento) {
            if (evento.key === 'Enter') {
                converterMedida();
            }
        });
    </script>
    <button></button>
</body>
</html>
