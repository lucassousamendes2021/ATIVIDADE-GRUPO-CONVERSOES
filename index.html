<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conversor de Medidas</title>
    <link rel="stylesheet" href="pagina-1.css">
</head>
<body>

    <div class="container-conversor">
        <h1>Conversor de Centímetros para Metros</h1>

        <div class="campo-grupo">
            <label for="cmInput">Centímetros (cm):</label>
            <input type="number" id="cmInput" placeholder="Ex: 150" min="0">

        <button id="btnConverter">Converter</button>

        <div id="resultadoContainer" class="resultado-box">
            <p id="resultadoTexto"></p>
        </div>

        <a href= "pagina2.html" class="btn-avancar">Avançar →</a>
